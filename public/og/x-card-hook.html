<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>VaultBit · Tu Ledger no protege tu Bitcoin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --anthracite-950:#0D0F11;
    --anthracite-900:#15181B;
    --anthracite-800:#1E2227;
    --anthracite-200:#9CA3AB;
    --anthracite-100:#D5D9DD;
    --orange-500:#F2761A;
    --orange-400:#FF8A33;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;}
  html,body{width:1080px;height:1080px;overflow:hidden;background:#000;}
  body{
    font-family:'Inter',system-ui,sans-serif;
    color:#fff;
    background:
      radial-gradient(circle at 80% 0%, rgba(242,118,26,0.18), transparent 55%),
      radial-gradient(circle at 0% 100%, rgba(242,118,26,0.08), transparent 50%),
      linear-gradient(135deg, #0D0F11 0%, #15181B 100%);
    position:relative;
    padding:64px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
  }
  /* sutil grid de fondo */
  body::before{
    content:'';
    position:absolute;
    inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size:60px 60px;
    pointer-events:none;
  }
  /* header */
  .top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    z-index:2;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:14px;
  }
  .brand-mark{
    width:42px;height:42px;
    border-radius:10px;
    background:linear-gradient(135deg, var(--orange-500), var(--orange-400));
    display:flex;align-items:center;justify-content:center;
    color:#000;font-weight:800;font-size:18px;letter-spacing:-0.5px;
    box-shadow: 0 0 0 1px rgba(242,118,26,0.3), 0 8px 24px -4px rgba(242,118,26,0.4);
  }
  .brand-text{
    font-weight:600;font-size:16px;letter-spacing:0.16em;text-transform:uppercase;color:#fff;
  }
  .brand-sub{
    font-weight:400;font-size:13px;letter-spacing:0.06em;color:var(--anthracite-200);margin-top:2px;
  }
  .eyebrow{
    display:inline-flex;align-items:center;gap:8px;
    padding:8px 14px;
    border:1px solid rgba(242,118,26,0.4);
    background:rgba(242,118,26,0.08);
    border-radius:999px;
    font-size:12px;font-weight:600;letter-spacing:0.12em;color:var(--orange-400);text-transform:uppercase;
  }
  .eyebrow-dot{width:6px;height:6px;border-radius:50%;background:var(--orange-400);box-shadow:0 0 12px var(--orange-400);}

  /* main */
  .main{
    z-index:2;
    display:flex;
    flex-direction:column;
    gap:32px;
  }
  h1{
    font-size:96px;
    line-height:1.05;
    font-weight:700;
    letter-spacing:-2.5px;
    color:#fff;
  }
  h1 .accent{
    color:var(--orange-500);
    position:relative;
  }
  h1 .accent::after{
    content:'';
    position:absolute;
    left:0;right:0;bottom:8px;
    height:8px;
    background:linear-gradient(90deg, transparent, rgba(242,118,26,0.4), transparent);
    border-radius:4px;
  }
  .lead{
    font-size:30px;
    line-height:1.45;
    color:var(--anthracite-100);
    font-weight:400;
    max-width:920px;
    border-left:3px solid var(--orange-500);
    padding-left:24px;
  }
  .lead strong{color:#fff;font-weight:600;}

  /* footer */
  .bottom{
    display:flex;
    align-items:center;
    justify-content:space-between;
    z-index:2;
    padding-top:24px;
    border-top:1px solid rgba(255,255,255,0.08);
  }
  .bottom-left{
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .bottom-label{
    font-size:11px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--anthracite-200);
    font-weight:600;
  }
  .bottom-value{
    font-size:20px;
    color:#fff;
    font-weight:500;
    letter-spacing:-0.3px;
  }
  .bottom-cta{
    display:inline-flex;
    align-items:center;
    gap:10px;
    padding:14px 22px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:12px;
    color:#fff;
    font-weight:500;
    font-size:16px;
  }
  .bottom-cta .arrow{color:var(--orange-400);}
</style>
</head>
<body>
  <header class="top">
    <div class="brand">
      <div class="brand-mark">V</div>
      <div>
        <div class="brand-text">VaultBit Advisory</div>
        <div class="brand-sub">Custodia · Herencia · Fiscalidad cripto · España</div>
      </div>
    </div>
    <span class="eyebrow"><span class="eyebrow-dot"></span>Hilo · Herencia digital</span>
  </header>

  <section class="main">
    <h1>
      Tu Ledger no protege<br/>
      tu <span class="accent">Bitcoin.</span>
    </h1>
    <p class="lead">
      Lo único que lo protege es <strong>el plan que tienes para cuando tú no estés</strong>.
      Y casi nadie lo tiene.
    </p>
  </section>

  <footer class="bottom">
    <div class="bottom-left">
      <span class="bottom-label">Diagnóstico gratuito</span>
      <span class="bottom-value">vaultbit.es/diagnostico</span>
    </div>
    <div class="bottom-cta">
      90 segundos <span class="arrow">→</span>
    </div>
  </footer>
</body>
</html>
